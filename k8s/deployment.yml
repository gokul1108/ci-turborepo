apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bms-backend
  template:
    metadata:
      labels:
        app: bms-backend
    spec:
      containers:
      - name: bms-backend
        image: gokul1108/bms-backend-k8s:latest
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@bms-db:5432/postgres"
        ports:
        - containerPort: 3002
        
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bms-db
  template:
    metadata:
      labels:
        app: bms-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres

---
apiVersion: v1
kind: Service
metadata:
  name: bms-db
spec:
  selector:
    app: bms-db
  ports:
    - port: 5432
      targetPort: 5432